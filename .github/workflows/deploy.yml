name: Deploy VinylVault to Firebase

# ─────────────────────────────────────────────────────────────────────────────
# VEREISTE IAM-ROL voor volledig automatische deploy (rules + functions):
#
#   1. Ga naar https://console.cloud.google.com/iam-admin/iam?project=vinylvault-7b7f5
#   2. Zoek het service account dat in FIREBASE_SERVICE_ACCOUNT staat
#      (e-mailadres staat in het JSON-object onder "client_email")
#   3. Klik op het potlood-icoon en voeg toe: rol "Firebase Admin"
#
# Zonder deze rol deployt alleen Hosting succesvol; rules en functions worden
# als best-effort geprobeerd (continue-on-error) en overgeslagen als de rol
# ontbreekt — de build faalt dan niet.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Cloud Functions dependencies
        run: npm ci --prefix functions

      - name: Write env file
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          if [ -z "$ENV_FILE" ]; then
            echo "ERROR: ENV_FILE secret is niet ingesteld in GitHub Secrets"
            exit 1
          fi
          printf '%s' "$ENV_FILE" > .env.local

      - name: Build frontend
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: vinylvault-7b7f5

      - name: Write functions env (Discogs token, optioneel)
        env:
          DISCOGS_TOKEN: ${{ secrets.DISCOGS_TOKEN }}
        run: |
          if [ -n "$DISCOGS_TOKEN" ]; then
            printf 'DISCOGS_TOKEN=%s\n' "$DISCOGS_TOKEN" > functions/.env
            echo "functions/.env aangemaakt met DISCOGS_TOKEN."
          else
            echo "Geen DISCOGS_TOKEN secret ingesteld — Discogs wordt overgeslagen, MusicBrainz-fallback wordt gebruikt."
          fi

      - name: Deploy Firestore Rules, Storage Rules & Functions
        continue-on-error: true
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/firebase-sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json \
            npx --yes firebase-tools deploy \
            --only firestore:rules,storage,functions \
            --project vinylvault-7b7f5 \
            --force \
            --non-interactive
          rm -f /tmp/firebase-sa.json
