name: Deploy VinylVault to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Cloud Functions dependencies
        run: npm ci --prefix functions

      - name: Write env file
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          if [ -z "$ENV_FILE" ]; then
            echo "ERROR: ENV_FILE secret is niet ingesteld in GitHub Secrets"
            exit 1
          fi
          printf '%s' "$ENV_FILE" > .env.local

      - name: Build frontend
        run: npm run build

      - name: Deploy to Firebase (Hosting + Firestore Rules + Storage Rules + Functions)
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/firebase-sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json \
            npx --yes firebase-tools deploy \
            --only hosting,firestore:rules,storage:rules,functions \
            --project vinylvault-7b7f5 \
            --non-interactive
          rm -f /tmp/firebase-sa.json
